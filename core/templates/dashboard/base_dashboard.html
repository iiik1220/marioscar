{% extends 'base.html' %}
{% block content %}
<style>
    .admin-shell {
        display: grid;
        grid-template-columns: 270px 1fr;
        gap: 24px;
        align-items: start;
    }

    .admin-sidebar {
        position: sticky;
        top: 20px;
        background: linear-gradient(145deg, #0f0f10, #171717);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 24px;
        padding: 22px 18px;
        box-shadow: 0 14px 30px rgba(0,0,0,0.25);
    }

    .admin-sidebar h4 {
        font-weight: 900;
        margin-bottom: 4px;
        color: #fff;
    }

    .admin-sidebar p {
        color: #999;
        margin-bottom: 18px;
        font-size: .92rem;
    }

    .admin-nav {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .admin-nav a {
        display: block;
        padding: 12px 14px;
        border-radius: 14px;
        color: #e6e6e6;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.05);
        font-weight: 700;
        transition: .2s ease;
    }

    .admin-nav a:hover {
        background: #e10600;
        color: #fff;
    }

    .admin-content {
        min-width: 0;
    }

    .panel-card {
        background: linear-gradient(145deg, #111111, #1a1a1a);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .toolbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }

    .table-wrap {
        overflow-x: auto;
    }

    .admin-table {
        width: 100%;
        border-collapse: collapse;
    }

    .admin-table th,
    .admin-table td {
        padding: 12px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        vertical-align: middle;
    }

    .admin-table th {
        color: #fff;
        font-weight: 800;
    }

    .admin-table td {
        color: #d9d9d9;
    }

    .positive { color: #19c37d; font-weight: 800; }
    .negative { color: #ff4d4f; font-weight: 800; }

    .mini-muted {
        color: #9f9f9f;
        font-size: .92rem;
    }

    .card-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
    }

    .entity-card {
        background: linear-gradient(145deg, #111111, #1a1a1a);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .entity-card img {
        width: 100%;
        height: 210px;
        object-fit: cover;
    }

    .entity-card-body {
        padding: 18px;
    }

    .entity-title {
        font-size: 1.2rem;
        font-weight: 900;
        color: #fff;
        margin-bottom: 8px;
    }

    .entity-meta {
        color: #a8a8a8;
        margin-bottom: 12px;
    }

    .entity-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .form-panel {
        max-width: 980px;
        background: linear-gradient(145deg, #111111, #1a1a1a);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 24px;
        padding: 26px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .help-box {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 16px;
        padding: 14px 16px;
        color: #b8b8b8;
        margin-bottom: 18px;
    }

    @media (max-width: 1100px) {
        .card-list {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 992px) {
        .admin-shell {
            grid-template-columns: 1fr;
        }

        .admin-sidebar {
            position: static;
        }
    }

    @media (max-width: 768px) {
        .card-list {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="admin-shell">
    <aside class="admin-sidebar">
        <h4>Back-office</h4>
        <p>Gestion complète agence</p>

        <nav class="admin-nav">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'dashboard_car_models' %}">Modèles voiture</a>
            <a href="{% url 'dashboard_car_units' %}">Unités réelles</a>
            <a href="{% url 'dashboard_clients' %}">Clients</a>
            <a href="{% url 'dashboard_reservations' %}">Réservations</a>
            <a href="{% url 'dashboard_finance' %}">Finance</a>
            <a href="{% url 'dashboard_maintenances' %}">Entretiens</a>
            <a href="{% url 'dashboard_accidents' %}">Accidents</a>
            <a href="{% url 'dashboard_parts' %}">Pièces de rechange</a>
        </nav>
    </aside>

    <section class="admin-content">
        {% block dashboard_content %}{% endblock %}
    </section>
</div>
{% endblock %}
